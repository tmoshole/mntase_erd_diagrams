<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Mntase PWA and Data Engine implementation roadmap">
  <title>Mntase Build Plan</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
      --ink: #342522;
      --soft: #755f58;
      --clay: #9b5043;
      --clay-dark: #71372f;
      --clay-pale: #f8eae5;
      --paper: #ffffff;
      --canvas: #f4efe9;
      --line: #ded2ca;
      --green: #286344;
      --green-pale: #e8f3ec;
      --gold: #8a611e;
      --gold-pale: #fbf1dc;
      --blue: #285f76;
      --blue-pale: #e7f1f5;
      --shadow: 0 12px 34px rgba(62, 39, 35, .08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 24px; }
    body {
      margin: 0;
      background: var(--canvas);
      color: var(--ink);
      line-height: 1.6;
    }
    a { color: var(--clay-dark); }
    code {
      padding: 2px 6px;
      border-radius: 5px;
      background: #f1ebe7;
      color: #6d342d;
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: .9em;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .92);
      backdrop-filter: blur(10px);
    }
    .topbar-inner {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
      padding: 14px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .topbar a { font-weight: 700; text-decoration: none; }
    .topbar-title { color: var(--soft); font-size: 14px; }

    .page {
      width: min(1240px, calc(100% - 32px));
      margin: 32px auto 72px;
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      gap: 28px;
      align-items: start;
    }
    .toc {
      position: sticky;
      top: 24px;
      max-height: calc(100vh - 48px);
      overflow: auto;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }
    .toc strong {
      display: block;
      margin-bottom: 10px;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .toc a {
      display: block;
      margin: 3px 0;
      padding: 6px 8px;
      border-radius: 7px;
      color: var(--soft);
      font-size: 14px;
      line-height: 1.3;
      text-decoration: none;
    }
    .toc a:hover, .toc a:focus { background: var(--clay-pale); color: var(--clay-dark); }
    .toc .sub { padding-left: 20px; font-size: 13px; }

    .content { min-width: 0; }
    .hero {
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      padding: 48px;
      border-radius: 22px;
      background: var(--clay-dark);
      color: white;
      box-shadow: var(--shadow);
    }
    .hero::after {
      content: "";
      position: absolute;
      width: 280px;
      height: 280px;
      right: -100px;
      bottom: -170px;
      border: 45px solid rgba(255, 255, 255, .08);
      border-radius: 50%;
    }
    .hero h1 {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 0 16px;
      font-size: clamp(36px, 6vw, 62px);
      line-height: 1.02;
      letter-spacing: -.035em;
    }
    .hero p {
      position: relative;
      z-index: 1;
      max-width: 750px;
      margin: 0;
      color: #f5ded7;
      font-size: 18px;
    }

    .section {
      margin: 20px 0;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 0 5px 18px rgba(62, 39, 35, .04);
    }
    .section > h2 {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.2;
    }
    .section h3 {
      margin: 28px 0 8px;
      font-size: 21px;
      line-height: 1.3;
    }
    .section h3:first-child { margin-top: 0; }
    .section h4 { margin: 20px 0 5px; font-size: 14px; text-transform: uppercase; letter-spacing: .06em; }
    .section p { margin: 8px 0 14px; }
    .section ul, .section ol { margin: 8px 0 18px; padding-left: 23px; }
    .section li { margin: 7px 0; padding-left: 3px; }

    .phase {
      border-left: 6px solid var(--clay);
    }
    .phase > h2 {
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    .duration {
      display: inline-block;
      margin: 0 0 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--blue-pale);
      color: var(--blue);
      font-size: 13px;
      font-weight: 800;
    }
    .deliverable {
      margin-top: 20px !important;
      padding: 16px 18px;
      border-radius: 10px;
      background: var(--green-pale);
      color: #214d36;
    }

    .stack-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .stack-grid article {
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: #fffdfa;
    }
    .stack-grid h3 { margin-top: 0; }

    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      background: white;
      font-size: 14px;
    }
    th, td {
      padding: 13px 14px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { background: #f2e9e3; }
    tbody tr:nth-child(even) { background: #fcfaf8; }

    .loading, .error {
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
    }
    .error { border-left: 5px solid #a33e34; }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .toc { position: static; max-height: none; }
      .toc nav { columns: 2; }
    }
    @media (max-width: 680px) {
      .page { width: min(100% - 20px, 1240px); margin-top: 18px; }
      .topbar-inner { width: min(100% - 20px, 1240px); }
      .topbar-title { display: none; }
      .hero { padding: 30px 24px; }
      .section { padding: 23px 20px; }
      .stack-grid { grid-template-columns: 1fr; }
      .toc nav { columns: 1; }
    }
    @media print {
      body { background: white; }
      .topbar, .toc { display: none; }
      .page { display: block; width: 100%; margin: 0; }
      .hero { box-shadow: none; print-color-adjust: exact; }
      .section { box-shadow: none; break-inside: avoid; }
      .phase { break-before: page; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="./index.html">&larr; Database architecture</a>
      <span class="topbar-title">Mntase PWA and Data Engine</span>
      <a href="./Mntase_Build_Plan.md">View source</a>
    </div>
  </header>

  <main class="page">
    <aside class="toc" aria-label="Build plan contents">
      <strong>On this page</strong>
      <nav id="toc"><span class="topbar-title">Loading contents...</span></nav>
    </aside>
    <div class="content">
      <section class="hero">
        <h1>Mntase build plan</h1>
        <p>A practical roadmap for the member PWA, data engine, campaign platform, privacy controls, and production pilot.</p>
      </section>
      <div id="plan" class="loading" aria-live="polite">Loading the build plan...</div>
    </div>
  </main>

  <script>
    const escapeHtml = (value) => value
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;");

    const slugify = (value) => value
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/^-|-$/g, "");

    const inline = (value) => escapeHtml(value)
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");

    function parseMarkdown(markdown) {
      const lines = markdown.replace(/\r/g, "").split("\n");
      const output = [];
      let listType = null;
      let sectionOpen = false;

      const closeList = () => {
        if (listType) output.push(`</${listType}>`);
        listType = null;
      };
      const closeSection = () => {
        closeList();
        if (sectionOpen) output.push("</section>");
        sectionOpen = false;
      };

      for (let index = 0; index < lines.length; index += 1) {
        const raw = lines[index];
        const line = raw.trim();
        if (!line) {
          closeList();
          continue;
        }

        if (line.startsWith("|") && lines[index + 1]?.trim().match(/^\|[-| ]+\|$/)) {
          closeList();
          const headers = line.split("|").slice(1, -1).map(cell => cell.trim());
          index += 2;
          const rows = [];
          while (index < lines.length && lines[index].trim().startsWith("|")) {
            rows.push(lines[index].trim().split("|").slice(1, -1).map(cell => cell.trim()));
            index += 1;
          }
          index -= 1;
          output.push('<div class="table-wrap"><table><thead><tr>');
          headers.forEach(header => output.push(`<th>${inline(header)}</th>`));
          output.push("</tr></thead><tbody>");
          rows.forEach(row => {
            output.push("<tr>");
            row.forEach(cell => output.push(`<td>${inline(cell)}</td>`));
            output.push("</tr>");
          });
          output.push("</tbody></table></div>");
          continue;
        }

        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          closeList();
          let level = heading[1].length;
          const text = heading[2];
          if (level === 1) continue;
          const phase = level === 3 && /^Phase \d+/.test(text);
          if (level === 2 || phase) {
            closeSection();
            output.push(`<section class="section${phase ? " phase" : ""}">`);
            sectionOpen = true;
          }
          if (phase) level = 2;
          const id = slugify(text);
          output.push(`<h${level} id="${id}">${inline(text)}</h${level}>`);
          continue;
        }

        const bullet = line.match(/^[-*]\s+(.+)$/);
        const numbered = line.match(/^\d+\.\s+(.+)$/);
        if (bullet || numbered) {
          const desired = bullet ? "ul" : "ol";
          if (listType !== desired) {
            closeList();
            output.push(`<${desired}>`);
            listType = desired;
          }
          output.push(`<li>${inline((bullet || numbered)[1])}</li>`);
          continue;
        }

        closeList();
        if (line === "**Build**" || line === "**Deliverable**") {
          output.push(`<h4>${inline(line)}</h4>`);
        } else if (line.startsWith("**Duration:**")) {
          output.push(`<p class="duration">${inline(line)}</p>`);
        } else {
          const isDeliverable = output.at(-1)?.startsWith("<h4") &&
            output.at(-1)?.includes("Deliverable");
          output.push(`<p${isDeliverable ? ' class="deliverable"' : ""}>${inline(line)}</p>`);
        }
      }
      closeSection();
      return output.join("\n");
    }

    function enhancePlan() {
      document.querySelectorAll(".section").forEach(section => {
        const heading = section.querySelector(":scope > h2");
        if (heading?.textContent === "Recommended stack") {
          const grid = document.createElement("div");
          grid.className = "stack-grid";
          let card = null;
          [...section.children].slice(1).forEach(element => {
            if (element.tagName === "H3") {
              card = document.createElement("article");
              grid.appendChild(card);
            }
            (card || grid).appendChild(element);
          });
          section.appendChild(grid);
        }
      });

      const toc = document.querySelector("#toc");
      toc.innerHTML = "";
      document.querySelectorAll("#plan h2, #plan .phase h3").forEach(heading => {
        const link = document.createElement("a");
        link.href = `#${heading.id}`;
        link.textContent = heading.textContent;
        if (heading.tagName === "H3") link.className = "sub";
        toc.appendChild(link);
      });
    }

    fetch("./Mntase_Build_Plan.md")
      .then(response => {
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.text();
      })
      .then(markdown => {
        const plan = document.querySelector("#plan");
        plan.className = "";
        plan.innerHTML = parseMarkdown(markdown);
        enhancePlan();
      })
      .catch(() => {
        const plan = document.querySelector("#plan");
        plan.className = "error";
        plan.innerHTML = `
          <strong>The build plan could not be loaded directly.</strong>
          <p>Open this folder through a local web server, or read the
          <a href="./Mntase_Build_Plan.md">Markdown build plan</a>.</p>
        `;
        document.querySelector("#toc").innerHTML = "";
      });
  </script>
</body>
</html>
